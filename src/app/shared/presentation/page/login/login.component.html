<div class="login-page">
  <div class="login-page__brand">
    <div class="login-page__brand-mark">
      <svg lucideZap class="login-page__brand-icon"></svg>
      <h1 class="login-page__brand-text">SmartCity<strong>Energy</strong></h1>
    </div>
    <p class="login-page__tagline">Monitor and manage public building energy consumption.</p>
    <div class="login-page__skyline" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="login-page__panel">
    <div class="login-page__card">
      <h2>Sign in</h2>

      <form [formGroup]="form" (ngSubmit)="login()">
        <div class="login-page__fields">
          <label class="login-page__label">
            Email
            <input class="login-page__input" type="email" formControlName="username" autocomplete="email" />
          </label>

          <label class="login-page__label">
            Password
            <input class="login-page__input" type="password" formControlName="password" autocomplete="current-password" />
          </label>

          @if (errorMessage()) {
            <p class="login-page__error" role="alert">{{ errorMessage() }}</p>
          }
        </div>

        <button type="submit" class="btn btn--primary login-page__submit" [disabled]="form.invalid || isLoading()">
          {{ isLoading() ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>

      <div class="login-page__divider"><span>or</span></div>

      <button type="button" class="btn btn--secondary login-page__google-btn" (click)="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="login-page__register">
        Don't have an account? <a routerLink="/register" class="login-page__register-link">Register</a>
      </p>
    </div>
  </div>
</div>
