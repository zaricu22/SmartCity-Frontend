# 1. The name of your workflow
name: Frontend CI/CD Pipeline

# 2. The TRIGGER: When should this run?
on:
  push:
    branches: [dev, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [dev, main]

# 3. The JOBS: What should it do?
jobs:
  # -------------------------------------------------------------------------
  # JOB 1: SECURITY - The "Shield"
  # -------------------------------------------------------------------------
  security-static:
    name: Security Scan - Static
    # [OFFICIAL] GitHub-hosted runner, maintained by GitHub
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required to upload CodeQL SARIF results
      actions: read
      contents: read

    # 4. The STEPS: The individual commands
    steps:
      # [OFFICIAL] actions/checkout — clones the repo into the runner
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks: Scans for secrets in JS/TS files and environment variables
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # CodeQL: GitHub's SAST — detects security vulnerabilities in TypeScript/JavaScript source code.
      # init must run before npm ci so CodeQL can instrument the dependency installation.
      # analyze must run last; for interpreted languages (JS/TS) no autobuild step is needed.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      # [OFFICIAL] actions/setup-node — installs Node.js; 'cache: npm' caches node_modules between runs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # "Clean Install" - ensures reproducible builds
      - name: Install dependencies
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  security-snyk-dependencies:
    name: SNYK Dependency Check
    runs-on: ubuntu-latest # [OFFICIAL] GitHub-hosted runner, maintained by GitHub
    permissions:
      contents: read
    steps:
      # [OFFICIAL] actions/checkout — clones the repo into the runner
      - uses: actions/checkout@v4

      # [OFFICIAL] actions/setup-node — installs Node.js; 'cache: npm' caches node_modules between runs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --file=package.json
            --severity-threshold=critical

  security-owasp-dependencies:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      # [OFFICIAL] actions/checkout — clones the repo into the runner
      - uses: actions/checkout@v4

      # [OFFICIAL] actions/cache — persists the NVD database between runs to avoid re-downloading it
      - name: Cache OWASP dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.cache/dependency-check
          key: owasp-node-${{ runner.os }}

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "angular-app"
          path: "."
          format: "HTML"
          out: "reports"

      # [OFFICIAL] actions/upload-artifact — saves the HTML report as a downloadable artifact
      # if: always() ensures the report is available even when the scan finds vulnerabilities and exits non-zero
      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-frontend-report
          path: reports

  # -------------------------------------------------------------------------
  # JOB 2: TESTING - The "Validator"
  # -------------------------------------------------------------------------
  test:

    name: Build and Test
    runs-on: ubuntu-latest
    needs: [ security-static, security-snyk-dependencies, security-owasp-dependencies ]
    steps:
      # [OFFICIAL] actions/checkout — clones the repo into the runner
      - uses: actions/checkout@v4

      # [OFFICIAL] actions/setup-node — installs Node.js; 'cache: npm' caches node_modules between runs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Unit/Integration Tests: Runs Jest with coverage so the lcov report can be
      # uploaded once here and reused by code-quality — avoids running the suite twice.
      - name: Run Angular tests
        run: npx jest --coverage

      # Codecov: Uploads test coverage reports to a visual dashboard
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      # GitHub Action Artifact: Upload lcov report to be consumed by SonarCloud in code-quality job
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: coverage/lcov.info

  # -------------------------------------------------------------------------
  # JOB 3: ARCHITECTURE - The "Guardian"
  # Runs in parallel with test — pure import-graph analysis, no browser needed.
  # Fails fast if any DDD layer rule, placement, or naming convention is violated.
  # -------------------------------------------------------------------------
  architecture:
    name: DDD Architecture Check
    runs-on: ubuntu-latest
    needs: [ security-static, security-snyk-dependencies, security-owasp-dependencies ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run architecture tests
        run: npm run test:arch

  # -------------------------------------------------------------------------
  # JOB 4: CODE QUALITY - The "Linter"
  # -------------------------------------------------------------------------
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    needs: [ security-static, security-snyk-dependencies, security-owasp-dependencies, test, architecture ]
    steps:
      # [OFFICIAL] actions/checkout — fetch-depth: 0 required for SonarCloud blame data
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # [OFFICIAL] actions/setup-node — installs Node.js; 'cache: npm' caches node_modules between runs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # [OFFICIAL] actions/cache — persists the SonarCloud scanner cache between runs
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      # ESLint: The frontend equivalent of PMD/Checkstyle (logic and style)
      - name: Run Lint
        run: npm run lint

      # Download lcov report generated by the test job — no need to re-run the suite
      - uses: actions/download-artifact@v4
        with:
          name: lcov-report
          path: coverage

      # SonarCloud: Analyzes TS/JS quality and CSS complexity
      # sonar.tests + sonar.test.inclusions — classifies *.spec.ts as test files, not sources; prevents
      #   the Zero Coverage Sensor from marking spec files 0% when they are absent from lcov
      # sonar.exclusions — src/test/** contains ts-arch infrastructure (runs via ts-node, not Jest);
      #   excluded from all analysis — no coverage requirement, no code quality rules
      # sonar.javascript.lcov.reportPaths — path to the Istanbul lcov report
      # sonar.javascript.tsconfigPaths — pins the scanner to these two tsconfigs; prevents
      #   auto-discovery of cypress/tsconfig.json which causes a parse error in the JS sensor
      # sonar.coverage.exclusions — bootstrap entry points and route/config files have no testable
      #   logic; environments/** and main*.ts are already excluded from Jest collectCoverageFrom
      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=zaricu22_SmartCity-Frontend
            -Dsonar.projectName=smartcityfront
            -Dsonar.organization=zaricu22
            -Dsonar.sources=src
            -Dsonar.exclusions=src/test/**
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.javascript.tsconfigPaths=tsconfig.json,tsconfig.spec.json
            -Dsonar.coverage.exclusions=src/main.ts,src/main.server.ts,src/environments/**,src/app/app.config.ts,src/app/app.config.server.ts,src/app/app.routes.ts,src/app/asset/presentation/route/asset.routes.ts
            -Dsonar.qualitygate.wait=true

  # -------------------------------------------------------------------------
  # JOB 5: RELEASE & DEPLOY TO GH-PAGES
  # Conditional: This job ONLY runs when code hits 'main'
  # -------------------------------------------------------------------------
  release-and-deploy:
    name: Semantic Release & GH-Pages Deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    permissions:
      contents: write # Required for pushing to the gh-pages branch
    steps:
      # [OFFICIAL] actions/checkout — GH_TOKEN used instead of GITHUB_TOKEN to allow tag pushing
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      # [OFFICIAL] actions/setup-node — installs Node.js; 'cache: npm' caches node_modules between runs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Build the project (This creates the 'dist' or 'build' folder)
      - name: Build Project
        run: npm run build

      # 2. Semantic Release (Updates versions/tags)
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npx \
            -p semantic-release \
            -p @semantic-release/changelog \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/github \
            -p @semantic-release/git \
            semantic-release \
            --plugins @semantic-release/commit-analyzer \
            --plugins @semantic-release/release-notes-generator \
            --plugins @semantic-release/changelog \
            --plugins @semantic-release/github \
            --plugins @semantic-release/git

      # 3. Deploy to GitHub Pages: Moves the 'dist' folder to 'gh-pages' branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
